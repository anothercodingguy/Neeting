services:
  # Backend - FastAPI
  - type: web
    name: neeting-api
    env: python
    plan: free
    rootDir: ./
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port 10000"
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ENVIRONMENT
        value: production

  # Frontend - Static Site
  - type: web
    name: neeting-frontend
    env: static
    rootDir: ./frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: out
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
