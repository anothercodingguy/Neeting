services:
  # Backend - FastAPI
  - type: web
    name: neeting-api
    env: python
    plan: free
    rootDir: ./
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port 10000"
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ENVIRONMENT
        value: production

  # Frontend - Next.js
  - type: web
    name: neeting-frontend
    env: node
    plan: free
    rootDir: ./frontend
    buildCommand: "npm install && npm run build && cp -r .next/static .next/standalone/.next/static && (cp -r public .next/standalone/public 2>/dev/null || true)"
    startCommand: "node .next/standalone/server.js"
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: PORT
        value: "10000"
      - key: HOSTNAME
        value: "0.0.0.0"
